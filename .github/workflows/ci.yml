name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-and-test:
    name: Check and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1
        with:
          version: "0.10.3+16975d007"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Moon version
        run: moon version --all

      - name: Update MoonBit registry
        run: moon update

      - name: Strict check
        run: moon check --fmt --deny-warn --target native

      - name: Public interface check
        shell: bash
        run: |
          moon info
          git diff --exit-code -- pkg.generated.mbti cmd/main/pkg.generated.mbti

      - name: Test
        run: moon test --deny-warn --target native

      - name: CLI smoke
        run: moon run --target native cmd/main -- stats

  acceptance:
    name: Acceptance Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1
        with:
          version: "0.10.3+16975d007"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python -m pip install pypdf

      - name: Update MoonBit registry
        run: moon update

      - name: Acceptance script
        shell: pwsh
        run: ./scripts/verify_acceptance.ps1
